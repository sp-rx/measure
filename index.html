<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
#app{display:flex;flex-direction:column;gap:12px;padding:12px 0}
#toolbar{display:flex;gap:8px;flex-wrap:wrap}
button{padding:8px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button.active{background:var(--color-background-info);color:var(--color-text-info)}

#zoom-row{display:flex;align-items:center;gap:10px}
#zoom-row label{font-size:13px;color:var(--color-text-secondary)}
#zoom-val{font-size:13px;font-weight:500;min-width:28px;text-align:right}

#viewport{position:relative;width:100%;aspect-ratio:4/3;background:var(--color-background-secondary);
border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);
overflow:hidden;cursor:grab;user-select:none;touch-action:none}
#viewport.grabbing{cursor:grabbing}

#photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;
transform-origin:center;pointer-events:none;display:none}

#placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary)}

.handle{position:absolute;width:22px;height:22px;background:#fff;border:2px solid #378ADD;border-radius:50%;
transform:translate(-50%,-50%);cursor:crosshair;display:none;pointer-events:all}

#ruler-line{
  position:absolute;
  top:50%;
  left:0;
  width:300px;              /* ✅ FIXED 300px */
  height:0;
  border-top:2px dashed #E24B4A;
  transform:translateY(-50%);
  display:none;
}

#stats{min-height:36px;padding:8px 12px;background:var(--color-background-secondary);
border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary)}
</style>

<div id="app">

  <div id="toolbar">
    <button id="rulerBtn">Ruler</button>
    <button id="refBtn">300px Anchor</button>

    <!-- ✅ NEW: calibration input -->
    <label style="font-size:13px;display:flex;align-items:center;gap:6px;">
      Ref (cm):
      <input id="refCm" type="number" value="100" style="width:70px;">
    </label>
  </div>

  <div id="viewport">
    <img id="photo">
    <div id="ruler-line"></div>

    <div class="handle" id="h1"></div>
    <div class="handle" id="h2"></div>
  </div>

  <div id="stats">Enable ruler</div>
</div>

<script>
const vp=document.getElementById('viewport');
const ruler=document.getElementById('ruler-line');
const stats=document.getElementById('stats');
const refCmInput=document.getElementById('refCm');

const h1=document.getElementById('h1');
const h2=document.getElementById('h2');

let measureOn=false;
let refOn=false;

let p1={x:80,y:80}, p2={x:220,y:160};

/* ✅ SCALE: 300px = user-defined cm */
function getScale(){
  const cm = parseFloat(refCmInput.value || 100);
  return cm / 300; // cm per pixel
}

function updateHandles(){
  const dx=p2.x-p1.x;
  const dy=p2.y-p1.y;

  const pxDist=Math.sqrt(dx*dx+dy*dy);
  const cmDist=pxDist * getScale();

  stats.innerHTML =
    `Distance: <b>${pxDist.toFixed(1)} px</b> | <b>${cmDist.toFixed(2)} cm</b>`;
}

/* toggle ruler */
document.getElementById('rulerBtn').onclick=()=>{
  measureOn=!measureOn;
  h1.style.display=measureOn?'block':'none';
  h2.style.display=measureOn?'block':'none';
  updateHandles();
};

/* toggle anchor */
document.getElementById('refBtn').onclick=()=>{
  refOn=!refOn;
  ruler.style.display=refOn?'block':'none';
};

/* simple drag */
let dragging=null;

vp.addEventListener('pointerdown',e=>{
  const r=vp.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;

  if(!measureOn) return;

  dragging='h1';
  p1={x,y};
  updateHandles();
});

vp.addEventListener('pointermove',e=>{
  if(!dragging) return;

  const r=vp.getBoundingClientRect();
  const x=e.clientX-r.left;
  const y=e.clientY-r.top;

  p2={x,y};
  updateHandles();
});

vp.addEventListener('pointerup',()=>dragging=null);
</script>
