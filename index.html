<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:0;
  padding:10px;
}

/* IMPORTANT: stops iPad pinch zoom interfering */
#photoArea{
  position:relative;
  display:inline-block;
  overflow:hidden;
  border:1px solid #ccc;
  touch-action:none;
}

button{
  margin:5px;
}

#cameraModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:9999;
}

#video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#captureBtn{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:80px;
  border-radius:50%;
}

#photo{
  display:block;
  transform-origin:center;
  cursor:grab;
}

.line100{
  position:absolute;
  top:50%;
  left:50%;
  width:100px;
  height:2px;
  background:red;
  transform:translate(-50%,-50%);
  display:none;
}

.handle{
  position:absolute;
  width:12px;
  height:12px;
  background:blue;
  border-radius:50%;
  display:none;
}

#lengthText{
  margin-top:5px;
  font-weight:bold;
}
</style>
</head>

<body>

<button onclick="openCamera()">Open Camera</button>

<div>
  <label>Zoom</label>
  <input type="range" min="1" max="3" step="0.01" value="1" oninput="setZoom(this.value)">
</div>

<button onclick="toggle100()">Toggle 100px Line</button>
<button onclick="toggleMeasure()">Toggle Measure Line</button>

<div id="photoArea">
  <img id="photo">
  <div class="line100" id="line100"></div>

  <div class="handle" id="h1"></div>
  <div class="handle" id="h2"></div>
</div>

<div id="lengthText"></div>

<!-- CAMERA -->
<div id="cameraModal">
  <video id="video" autoplay playsinline></video>
  <button id="captureBtn" onclick="capture()">📷</button>
</div>

<script>

let stream;
let zoom = 1;

/* PAN STATE */
let offsetX = 0;
let offsetY = 0;
let draggingPhoto = false;
let startX, startY;

/* MEASURE STATE */
let dragging = null;
let p1 = {x:50,y:50};
let p2 = {x:200,y:200};

const photo = document.getElementById("photo");
const area = document.getElementById("photoArea");
const h1 = document.getElementById("h1");
const h2 = document.getElementById("h2");

/* ================= CAMERA ================= */

async function openCamera(){

  document.getElementById("cameraModal").style.display="block";

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:"environment"} }
  });

  document.getElementById("video").srcObject = stream;
}

function capture(){

  const video = document.getElementById("video");
  const canvas = document.createElement("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  photo.src = canvas.toDataURL("image/jpeg");

  document.getElementById("cameraModal").style.display="none";

  stream.getTracks().forEach(t=>t.stop());

  resetMeasure();
  applyTransform();
}

/* ================= ZOOM ================= */

function setZoom(v){
  zoom = v;
  applyTransform();
}

/* ================= PAN ================= */

function applyTransform(){
  photo.style.transform =
    `translate(${offsetX}px,${offsetY}px) scale(${zoom})`;
}

/* pointer-based PAN (iPad FIX) */
photo.addEventListener("pointerdown", e=>{
  draggingPhoto = true;
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
  photo.setPointerCapture(e.pointerId);
});

document.addEventListener("pointermove", e=>{

  if(draggingPhoto){
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    applyTransform();
  }

  if(!dragging) return;

  const rect = area.getBoundingClientRect();

  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  if(dragging==="h1") p1 = {x,y};
  if(dragging==="h2") p2 = {x,y};

  updateHandles();
});

document.addEventListener("pointerup", ()=>{
  draggingPhoto = false;
  dragging = null;
});

/* ================= OVERLAY ================= */

function toggle100(){
  const el = document.getElementById("line100");
  el.style.display = el.style.display==="block"?"none":"block";
}

function toggleMeasure(){
  const show = h1.style.display !== "block";

  h1.style.display = show ? "block" : "none";
  h2.style.display = show ? "block" : "none";

  if(show) updateHandles();
  else document.getElementById("lengthText").innerText="";
}

/* ================= BLUE DOTS (iPad FIX) ================= */

h1.addEventListener("pointerdown", e=>{
  dragging="h1";
  e.stopPropagation();
  h1.setPointerCapture(e.pointerId);
});

h2.addEventListener("pointerdown", e=>{
  dragging="h2";
  e.stopPropagation();
  h2.setPointerCapture(e.pointerId);
});

/* ================= MEASURE ================= */

function updateHandles(){

  h1.style.left = p1.x + "px";
  h1.style.top  = p1.y + "px";

  h2.style.left = p2.x + "px";
  h2.style.top  = p2.y + "px";

  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;

  document.getElementById("lengthText").innerText =
    "X: " + Math.abs(dx).toFixed(1) +
    " px | Y: " + Math.abs(dy).toFixed(1) + " px";
}

/* ================= RESET ================= */

function resetMeasure(){
  p1={x:80,y:80};
  p2={x:200,y:200};
}

</script>

</body>
</html>
